<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WaBlast Pro | Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #080b10; --surface: #0f1520; --surface2: #141c2a;
  --border: #1e2d42; --border2: #263550; --text: #e8f0fb;
  --text2: #7a90b0; --text3: #445570; --green: #22d172;
  --green-dim: rgba(34,209,114,0.10); --red: #f04f6e;
  --red-dim: rgba(240,79,110,0.12);
}
body {
  font-family: 'DM Sans', sans-serif; background: var(--bg);
  color: var(--text); min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.auth-card {
  max-width: 420px; width: 100%; background: var(--surface);
  border: 1px solid var(--border2); border-radius: 24px;
  padding: 40px 36px;
}
.auth-brand {
  display: flex; align-items: center; gap: 10px; margin-bottom: 32px;
}
.auth-brand-icon {
  width: 42px; height: 42px; background: var(--green);
  border-radius: 12px; display: flex; align-items: center;
  justify-content: center; font-size: 20px;
}
.auth-brand-name { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
.auth-brand-name span { color: var(--green); }
.auth-card h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.auth-card > p { font-size: 13px; color: var(--text2); margin-bottom: 28px; }
.auth-error {
  background: var(--red-dim); color: var(--red);
  border-radius: 10px; padding: 10px 14px;
  font-size: 13px; margin-bottom: 14px; display: none;
}
.fg { margin-bottom: 14px; }
.fg label {
  display: block; font-size: 11px; font-weight: 600;
  color: var(--text2); letter-spacing: .05em;
  text-transform: uppercase; margin-bottom: 7px;
}
.fg input {
  width: 100%; background: #0c1018;
  border: 1px solid var(--border2); border-radius: 12px;
  padding: 12px 14px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 14px;
}
.fg input:focus { outline: none; border-color: var(--green); }
.auth-btn {
  width: 100%; padding: 13px; background: var(--green); color: #000;
  font-weight: 700; border: none; border-radius: 12px;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  font-size: 14px; transition: background .15s;
}
.auth-btn:hover { background: #1bbf64; }
.auth-btn:disabled { background: var(--border2); color: var(--text3); cursor: not-allowed; }
.auth-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 18px 0; color: var(--text3); font-size: 12px;
}
.auth-divider::before, .auth-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border2);
}
.oauth-btn {
  width: 100%; padding: 12px; background: var(--surface2); color: var(--text);
  font-weight: 600; border: 1px solid var(--border2); border-radius: 12px;
  cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: border-color .15s; margin-bottom: 10px;
}
.oauth-btn:hover { border-color: var(--green); }
.footer-text {
  text-align: center; font-size: 12px; color: var(--text3); margin-top: 24px;
}
</style>
</head>
<body>
<div class="auth-card">
  <div class="auth-brand">
    <div class="auth-brand-icon">💬</div>
    <div class="auth-brand-name">Wa<span>Blast</span> <span style="font-size:13px;font-weight:400;color:var(--text3)">Pro</span></div>
  </div>
  <h1>Welcome back</h1>
  <p>Sign in to your WhatsApp Business dashboard</p>
  <div class="auth-error" id="authError"></div>
  <div class="fg"><label>Email</label><input type="email" id="authEmail" placeholder="you@example.com"></div>
  <div class="fg"><label>Password</label><input type="password" id="authPass" placeholder="••••••••"></div>
  <button class="auth-btn" id="authSubmitBtn">Sign In →</button>
  <div class="auth-divider">or</div>
  <button class="oauth-btn" onclick="handleGoogleLogin()">🌐 Continue with Google</button>
  <button class="oauth-btn" onclick="handleFacebookLogin()">📘 Continue with Facebook</button>
  <div class="footer-text">
    Don't have an account? Contact your administrator.
  </div>
</div>

<script>
const SUPABASE_URL = 'https://vnytcmoyvfyrvcmshwsz.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZueXRjbW95dmZ5cnZjbXNod3N6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5OTI3OTYsImV4cCI6MjA5ODU2ODc5Nn0.xG4BgzVqklaLKMv1Y9k4id8XSvXUgdarnJhGMebNO7s';

function showAuthError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg; el.style.display = 'block';
}

async function handleEmailAuth() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPass').value;
  if (!email || !password) { showAuthError('Please enter email and password'); return; }
  
  const btn = document.getElementById('authSubmitBtn');
  btn.textContent = 'Please wait…'; btn.disabled = true;
  
  try {
    const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    
    if (error) { showAuthError(error.message); }
    else if (data.session) {
      localStorage.setItem('auth_token', data.session.access_token);
      localStorage.setItem('user_id', data.user.id);
      window.location.href = '/dashboard.html';
    }
  } catch (err) { showAuthError(err.message); }
  btn.textContent = 'Sign In →'; btn.disabled = false;
}

async function handleGoogleLogin() {
  const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/dashboard.html' }
  });
  if (error) showAuthError(error.message);
}

async function handleFacebookLogin() {
  const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'facebook',
    options: { redirectTo: window.location.origin + '/dashboard.html' }
  });
  if (error) showAuthError(error.message);
}

document.getElementById('authSubmitBtn').onclick = handleEmailAuth;
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleEmailAuth();
});

// Check if already logged in
const savedToken = localStorage.getItem('auth_token');
if (savedToken) window.location.href = '/dashboard.html';
</script>
</body>
</html>
