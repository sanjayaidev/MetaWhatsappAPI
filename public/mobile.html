<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>WaBlast · Inbox</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    /* ===== LIGHT THEME (default) ===== */
    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --surface2: #f0f2f5;
      --surface3: #e4e6eb;
      --border: #e0e2e5;
      --border2: #c8cacc;
      --text: #1a1a2e;
      --text2: #4a4a6a;
      --text3: #8a8aaa;
      --green: #25d366;
      --green-dim: rgba(37, 211, 102, 0.15);
      --green-bg: #e8f5ee;
      --red: #f04f6e;
      --red-dim: rgba(240, 79, 110, 0.12);
      --amber: #f5a623;
      --amber-dim: rgba(245, 166, 35, 0.12);
      --blue: #4a8af4;
      --blue-dim: rgba(74, 138, 244, 0.12);
      --purple: #9d78fa;
      --radius: 14px;
      --safe-top: env(safe-area-inset-top, 20px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --tab-h: 64px;
      --header-h: 56px;
    }

    /* ===== DARK THEME ===== */
    [data-theme="dark"] {
      --bg: #0b0f15;
      --surface: #141a24;
      --surface2: #1c2535;
      --surface3: #263042;
      --border: #2a364a;
      --border2: #3a4a62;
      --text: #eaf0fa;
      --text2: #8ba0c0;
      --text3: #5a6f8a;
      --green: #25d366;
      --green-dim: rgba(37, 211, 102, 0.12);
      --green-bg: #0d2618;
      --red: #f04f6e;
      --red-dim: rgba(240, 79, 110, 0.12);
      --amber: #f5a623;
      --amber-dim: rgba(245, 166, 35, 0.12);
      --blue: #4a8af4;
      --blue-dim: rgba(74, 138, 244, 0.12);
      --purple: #9d78fa;
    }

    /* ===== SYSTEM PREFERENCE DETECTION ===== */
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #0b0f15;
        --surface: #141a24;
        --surface2: #1c2535;
        --surface3: #263042;
        --border: #2a364a;
        --border2: #3a4a62;
        --text: #eaf0fa;
        --text2: #8ba0c0;
        --text3: #5a6f8a;
        --green: #25d366;
        --green-dim: rgba(37, 211, 102, 0.12);
        --green-bg: #0d2618;
        --red: #f04f6e;
        --red-dim: rgba(240, 79, 110, 0.12);
        --amber: #f5a623;
        --amber-dim: rgba(245, 166, 35, 0.12);
        --blue: #4a8af4;
        --blue-dim: rgba(74, 138, 244, 0.12);
        --purple: #9d78fa;
      }
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      user-select: none;
      transition: background 0.3s ease, color 0.3s ease;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg);
      position: relative;
      box-shadow: 0 0 60px rgba(0,0,0,0.6);
    }

    /* ---------- HEADER ---------- */
    .app-header {
      padding: calc(var(--safe-top) + 8px) 16px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    .app-header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .app-header h1 span { color: var(--green); }
    .header-actions { display: flex; gap: 4px; align-items: center; }
    .icon-btn {
      background: none;
      border: none;
      color: var(--text2);
      padding: 6px 8px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      transition: background 0.15s, color 0.3s;
    }
    .icon-btn:active { background: var(--surface2); }
    
    /* Theme toggle button */
    .theme-toggle {
      font-size: 16px;
      padding: 4px 6px;
    }

    /* ---------- SEARCH ---------- */
    .search-wrap {
      padding: 8px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      gap: 10px;
      align-items: center;
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    .search-box {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--surface2);
      border-radius: 24px;
      padding: 6px 14px;
      gap: 8px;
      border: 1px solid transparent;
      transition: border 0.2s, background 0.3s ease;
    }
    .search-box:focus-within { border-color: var(--green); }
    .search-box input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      flex: 1;
      padding: 8px 0;
      font-family: 'Inter', sans-serif;
      transition: color 0.3s ease;
    }
    .search-box input::placeholder { color: var(--text3); }
    .search-box .icon { color: var(--text3); font-size: 16px; }

    /* ---------- CHAT LIST ---------- */
    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
      background: var(--bg);
      transition: background 0.3s ease;
    }
    .chat-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.12s, border-color 0.3s ease;
    }
    .chat-item:active { background: var(--surface2); }
    .chat-item .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 16px;
      color: #fff;
      background: var(--surface3);
      overflow: hidden;
      transition: background 0.3s ease;
    }
    .chat-item .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .chat-item .info { flex: 1; min-width: 0; }
    .chat-item .info .name {
      font-weight: 600;
      font-size: 15px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .chat-item .info .name .time {
      font-weight: 400;
      font-size: 11px;
      color: var(--text3);
      transition: color 0.3s ease;
    }
    .chat-item .info .name .time.unread { color: var(--green); font-weight: 600; }
    .chat-item .info .preview {
      font-size: 13px;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-top: 2px;
      transition: color 0.3s ease;
    }
    .chat-item .unread-badge {
      background: var(--green);
      color: #000;
      font-size: 11px;
      font-weight: 700;
      min-width: 20px;
      height: 20px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 6px;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text3);
      font-size: 14px;
      transition: color 0.3s ease;
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 10px; }

    /* ---------- THREAD OVERLAY ---------- */
    #threadOverlay {
      position: absolute;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      display: none;
      flex-direction: column;
      animation: slideUp 0.25s ease;
      transition: background 0.3s ease;
    }
    #threadOverlay.open { display: flex; }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .thread-header {
      padding: calc(var(--safe-top) + 6px) 10px 10px 6px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    .thread-header .back-btn {
      background: none;
      border: none;
      color: var(--text);
      font-size: 22px;
      padding: 4px 8px;
      cursor: pointer;
      transition: color 0.3s ease;
    }
    .thread-header .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      color: #fff;
      background: var(--surface3);
      overflow: hidden;
      transition: background 0.3s ease;
    }
    .thread-header .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .thread-header .tinfo { flex: 1; min-width: 0; }
    .thread-header .tinfo .name { font-weight: 600; font-size: 15px; }
    .thread-header .tinfo .status { font-size: 11px; color: var(--text3); transition: color 0.3s ease; }

    /* ---------- MESSAGE AREA ---------- */
    .msg-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      background: var(--bg);
      transition: background 0.3s ease;
    }
    .day-chip {
      align-self: center;
      background: var(--surface2);
      color: var(--text2);
      font-size: 11px;
      padding: 4px 14px;
      border-radius: 12px;
      margin: 6px 0;
      transition: background 0.3s ease, color 0.3s ease;
    }
    .bubble-row { display: flex; }
    .bubble-row.out { justify-content: flex-end; }
    .bubble {
      max-width: 80%;
      padding: 7px 11px 8px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.4;
      margin: 2px 6px;
      word-wrap: break-word;
      position: relative;
      transition: background 0.3s ease, color 0.3s ease;
    }
    .bubble.in {
      background: var(--surface2);
      border-bottom-left-radius: 3px;
    }
    .bubble.out {
      background: var(--green-dim);
      border-bottom-right-radius: 3px;
    }
    .bubble .meta {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 4px;
      margin-top: 4px;
      font-size: 10px;
      color: var(--text3);
      transition: color 0.3s ease;
    }
    .bubble .meta .tick { color: var(--text3); }
    .bubble .meta .tick.read { color: var(--blue); }

    /* ---------- COMPOSER ---------- */
    .composer {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      padding: 6px 8px calc(8px + var(--safe-bottom));
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    .composer .pill {
      flex: 1;
      background: var(--surface2);
      border-radius: 22px;
      display: flex;
      align-items: center;
      padding: 4px 6px 4px 14px;
      gap: 4px;
      min-height: 40px;
      border: 1px solid transparent;
      transition: border 0.2s, background 0.3s ease;
    }
    .composer .pill:focus-within { border-color: var(--green); }
    .composer .pill textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      resize: none;
      padding: 6px 0;
      max-height: 80px;
      min-height: 22px;
      transition: color 0.3s ease;
    }
    .composer .pill .action-btn {
      background: none;
      border: none;
      color: var(--text3);
      font-size: 18px;
      padding: 4px 6px;
      cursor: pointer;
      transition: color 0.3s ease;
    }
    .composer .pill .action-btn:active { color: var(--text2); }
    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--green);
      border: none;
      color: #000;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s;
    }
    .send-btn:active { opacity: 0.7; }
    .send-btn:disabled { opacity: 0.3; cursor: default; }

    /* ---------- REPLY MODE TOGGLE ---------- */
    .reply-mode-toggle {
      display: flex;
      gap: 4px;
      padding: 6px 10px 2px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    .reply-mode-toggle .mode-btn {
      background: none;
      border: 1px solid var(--border2);
      border-radius: 16px;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s, border-color 0.3s ease, color 0.3s ease;
    }
    .reply-mode-toggle .mode-btn.active {
      border-color: var(--green);
      background: var(--green-dim);
      color: var(--green);
    }
    .reply-mode-toggle .mode-btn:active { opacity: 0.6; }

    /* ---------- TEMPLATE POPUP ---------- */
    .modal-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: none;
      align-items: flex-end;
      justify-content: center;
      backdrop-filter: blur(4px);
      cursor: pointer;
    }
    .modal-overlay.open { display: flex; }
    .modal-sheet {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-height: 85%;
      padding: 12px 16px calc(16px + var(--safe-bottom));
      display: flex;
      flex-direction: column;
      transition: background 0.3s ease, transform 0.3s ease, opacity 0.3s ease;
      cursor: default;
    }
    .modal-sheet .handle {
      width: 40px;
      height: 4px;
      background: var(--border2);
      border-radius: 2px;
      margin: 0 auto 12px;
      transition: background 0.3s ease;
      cursor: grab;
      touch-action: none;
    }
    .modal-sheet .handle:active {
      cursor: grabbing;
    }
    .modal-sheet .title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .modal-sheet .sub {
      font-size: 12px;
      color: var(--text3);
      margin-bottom: 10px;
      transition: color 0.3s ease;
    }
    .modal-sheet .tpl-preview {
      background: var(--surface2);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 14px;
      border-left: 3px solid var(--green);
      font-size: 13px;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
      white-space: pre-wrap;
      transition: background 0.3s ease;
    }
    .modal-sheet .placeholder-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .modal-sheet .placeholder-row .tag {
      font-family: 'Inter', monospace;
      font-size: 12px;
      font-weight: 600;
      color: var(--purple);
      background: var(--surface3);
      padding: 2px 8px;
      border-radius: 6px;
      white-space: nowrap;
      transition: background 0.3s ease, color 0.3s ease;
    }
    .modal-sheet .placeholder-row input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
    }
    .modal-sheet .placeholder-row input:focus { border-color: var(--green); }
    .modal-sheet .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      justify-content: flex-end;
    }
    .modal-sheet .modal-actions button {
      padding: 8px 20px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 13px;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.15s;
    }
    .modal-sheet .modal-actions button:active { opacity: 0.7; }
    .modal-sheet .modal-actions .cancel {
      background: var(--surface2);
      color: var(--text2);
      transition: background 0.3s ease, color 0.3s ease;
    }
    .modal-sheet .modal-actions .send {
      background: var(--green);
      color: #000;
    }
    .modal-sheet .empty-tpl {
      padding: 20px;
      text-align: center;
      color: var(--text3);
      font-size: 13px;
      transition: color 0.3s ease;
    }

    /* ---------- JSON MODE ---------- */
    .json-input-area textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 10px;
      color: var(--text);
      font-family: 'Inter', monospace;
      font-size: 12px;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
    }
    .json-input-area textarea:focus { border-color: var(--green); }

    /* ---------- BOTTOM TABS ---------- */
    .bottom-tabs {
      display: flex;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      padding-bottom: var(--safe-bottom);
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    .bottom-tabs .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 0 4px;
      font-size: 10px;
      font-weight: 500;
      color: var(--text3);
      cursor: pointer;
      transition: color 0.15s, opacity 0.15s;
      border: none;
      background: none;
      font-family: 'Inter', sans-serif;
      gap: 2px;
    }
    .bottom-tabs .tab .tab-icon { font-size: 22px; line-height: 1; }
    .bottom-tabs .tab.active { color: var(--green); }
    .bottom-tabs .tab:active { opacity: 0.6; }
    .bottom-tabs .tab .badge {
      background: var(--red);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      border-radius: 10px;
      padding: 1px 6px;
      min-width: 16px;
      text-align: center;
      transition: background 0.3s ease;
    }

    /* ---------- TAB PANELS ---------- */
    .tab-panel {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
      transition: background 0.3s ease;
    }
    .tab-panel.active { display: flex; }

    /* ---------- SETTINGS PANEL ---------- */
    .settings-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .settings-scroll .section {
      margin-bottom: 24px;
    }
    .settings-scroll .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text2);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      transition: color 0.3s ease;
    }
    .setting-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 8px;
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    .setting-row .label {
      font-size: 13px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .setting-row .desc {
      font-size: 12px;
      color: var(--text3);
      margin-top: 2px;
      transition: color 0.3s ease;
    }
    .setting-row select, .setting-row textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      margin-top: 6px;
      outline: none;
      transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
    }
    .setting-row select:focus, .setting-row textarea:focus { border-color: var(--green); }
    .setting-row textarea { resize: vertical; min-height: 60px; }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toggle-row input[type="checkbox"] {
      width: 40px;
      height: 22px;
      appearance: none;
      background: var(--border2);
      border-radius: 12px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle-row input[type="checkbox"]:checked { background: var(--green); }
    .toggle-row input[type="checkbox"]::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle-row input[type="checkbox"]:checked::after { transform: translateX(18px); }
    .mode-selector {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
    .mode-selector .mode-opt {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: none;
      color: var(--text3);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s, border-color 0.3s ease, color 0.3s ease;
    }
    .mode-selector .mode-opt.active {

     API LAYER - REAL SERVER API CALLS
     ==================================================================== -->
<script>
// ====================================================================
//  API CONFIGURATION & AUTH
// ====================================================================
const API_BASE_URL = window.location.origin;
let authToken = null;

async function apiCall(endpoint, method = 'GET', body = null) {
  const headers = { 'Content-Type': 'application/json' };
  if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
  const options = { method, headers };
  if (body) options.body = JSON.stringify(body);
  try {
    const res = await fetch(`${API_BASE_URL}${endpoint}`, options);
    const data = await res.json();
    if (res.status === 401) {
      doLogout();
      throw new Error('Session expired');
    }
    return data;
  } catch (err) {
    console.error(`API Error [${endpoint}]:`, err);
    return { error: err.message, success: false };
  }
}

function doLogout() {
  authToken = null;
  localStorage.removeItem('supabase_token');
  window.location.href = '/login.html';
}

// ====================================================================
//  API FUNCTIONS - MATCHING DASHBOARD/CRM PATTERNS
// ====================================================================
const API = {
  // --- Messages / Chats ---
  getMessages: async () => {
    // Matches dashboard's /api/messages/received response shape: each row has
    // phone, contact_name, message_body, message_type, created_at, is_read.
    // This endpoint only returns inbound (received) messages, so every row
    // here is an incoming message — outbound replies are appended locally
    // to the thread when sent (see sendMessage / sendTemplateMessage).
    const res = await apiCall('/api/messages/received?limit=50');
    if (res.success) {
      const conversations = {};
      (res.messages || []).forEach(msg => {
        const phone = msg.phone;
        if (!conversations[phone]) {
          conversations[phone] = {
            phone: phone,
            name: msg.contact_name || phone,
            lastBody: msg.message_body || '',
            lastAt: msg.created_at,
            unread: 0,
            messages: []
          };
        }
        if (!msg.is_read) conversations[phone].unread += 1;
        conversations[phone].lastBody = msg.message_body || '';
        conversations[phone].lastAt = msg.created_at;
        conversations[phone].messages.push({
          dir: 'in',
          body: msg.message_body || '',
          type: msg.message_type || 'text',
          at: msg.created_at
        });
      });
      return { success: true, messages: Object.values(conversations), unread: res.unread || 0 };
    }
    return { success: false, messages: [], unread: 0 };
  },

  sendReply: async (phone, message) => {
    try {
      const json = JSON.parse(message);
      const res = await apiCall('/api/messages/reply-interactive', 'POST', {
        phone: phone,
        raw_interactive: json
      });
      return res;
    } catch (e) {
      const res = await apiCall('/api/messages/reply', 'POST', {
        phone: phone,
        message: message
      });
      return res;
    }
  },

  sendTemplate: async (phone, templateId, placeholders) => {
    const res = await apiCall('/api/messages/send-template', 'POST', {
      phone: phone,
      template_id: templateId,
      placeholders: placeholders
    });
    return res;
  },

  // --- Templates ---
  getTemplates: async () => {
    const res = await apiCall('/api/templates');
    if (res.success) {
      return { success: true, templates: res.templates || [] };
    }
    return { success: false, templates: [] };
  },

  // --- Settings ---
  getSettings: async () => {
    const res = await apiCall('/api/settings');
    if (res.success) {
      const s = res.settings || {};
      return {
        success: true,
        settings: {
          autoReply: !!s.auto_reply,
          autoReplyMode: s.auto_reply_mode || 'ai',
          systemPrompt: s.auto_reply_prompt || '',
          model: s.auto_reply_model || 'mistralai/mistral-small-4-119b-2603',
          templateId: s.auto_reply_template_id || '',
          hour_limit: s.hour_limit || 0,
          day_limit: s.day_limit || 0,
          min_gap: s.min_gap || 5,
          max_gap: s.max_gap || 15
        }
      };
    }
    return { success: false, settings: {} };
  },

  updateSettings: async (settings) => {
    const payload = {
      auto_reply: settings.autoReply,
      auto_reply_prompt: settings.systemPrompt,
      auto_reply_model: settings.model,
      auto_reply_mode: settings.autoReplyMode,
      auto_reply_template_id: settings.autoReplyMode === 'template' ? settings.templateId : null,
      hour_limit: settings.hour_limit,
      day_limit: settings.day_limit,
      min_gap: settings.min_gap,
      max_gap: settings.max_gap
    };
    const res = await apiCall('/api/settings', 'POST', payload);
    return res;
  },

  getAIModels: async () => {
    // Mirrors dashboard's loadAutoReplyModels(): fetch the real list from the
    // server, and if that fails fall back to the same single default model
    // the dashboard uses (no invented models that don't exist server-side).
    const res = await apiCall('/api/ai/models');
    if (res.success && res.models) {
      return { success: true, models: res.models };
    }
    return { success: true, models: ['moonshotai/kimi-k2.6'] };
  },

  // --- Profile ---
  getProfile: async () => {
    const res = await apiCall('/api/profile');
    if (res.success && res.user) {
      const profile = res.user;
      return {
        success: true,
        profile: {
          name: profile.full_name || profile.email,
          email: profile.email,
          avatar: null
        }
      };
    }
    return { success: false, profile: {} };
  },

  updateProfile: async (data) => {
    const res = await apiCall('/api/profile', 'PUT', {
      full_name: data.name,
      email: data.email
    });
    return res;
  },

  // --- WhatsApp Numbers ---
  getWANumbers: async () => {
    const res = await apiCall('/api/wa/accounts');
    if (res.success && res.accounts) {
      const numbers = res.accounts.map(acc => ({
        id: acc.id,
        phoneNumber: acc.phone_number || acc.display_phone_number,
        qualityRating: acc.quality_rating || 'Unknown',
        displayName: acc.name || acc.display_phone_number
      }));
      return { success: true, numbers: numbers };
    }
    return { success: false, numbers: [] };
  },

  disconnectNumber: async (id) => {
    const res = await apiCall(`/api/wa/accounts/${id}`, 'DELETE');
    return res;
  },

  startEmbeddedSignup: async () => {
    return { success: true, message: 'OAuth flow started' };
  },

  // --- Billing ---
  getBilling: async (period) => {
    // The endpoint returns { rows: [{ pricing_category, pricing_type, cost,
    // volume }, ...] } — same shape dashboard's loadBillingAnalytics() +
    // renderBillingAnalytics() consume. Aggregate it the same way dashboard
    // does: REGULAR = paid (business-initiated/billed), anything else = free.
    const res = await apiCall(`/api/billing/analytics?period=${period}`);
    if (res.success) {
      const rows = res.rows || [];
      const totalCost = rows.reduce((s, r) => s + (r.cost || 0), 0);
      const totalMsgs = rows.reduce((s, r) => s + (r.volume || 0), 0);
      const freeMsgs = rows.filter(r => r.pricing_type !== 'REGULAR').reduce((s, r) => s + (r.volume || 0), 0);
      const paidMsgs = rows.filter(r => r.pricing_type === 'REGULAR').reduce((s, r) => s + (r.volume || 0), 0);
      return { success: true, totalCost, freeMsgs, paidMsgs, totalMsgs, rows };
    }
    return { success: false, totalCost: 0, freeMsgs: 0, paidMsgs: 0, totalMsgs: 0, rows: [] };
  }
};
</script>

<script>
// ====================================================================
//  THEME MANAGEMENT
// ====================================================================
function getPreferredTheme() {
  // Check localStorage first
  const saved = localStorage.getItem('theme');
  if (saved === 'light' || saved === 'dark') return saved;
  // Fall back to system preference
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('theme', theme);
  // Update the toggle button icon
  const btn = document.querySelector('.theme-toggle');
  if (btn) {
    btn.textContent = theme === 'dark' ? '☀️' : '🌙';
  }
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  const next = current === 'dark' ? 'light' : 'dark';
  applyTheme(next);
}

// Apply theme on load
applyTheme(getPreferredTheme());

// Listen for system theme changes
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
  if (!localStorage.getItem('theme')) {
    applyTheme(e.matches ? 'dark' : 'light');
  }
});

// ====================================================================
//  APP STATE
// ====================================================================
let state = {
  conversations: [],
  messages: [],
  currentPhone: null,
  templates: [],
  approvedTemplates: [],
  settings: { autoReply: false, autoReplyMode: 'ai', systemPrompt: '', model: '', templateId: '' },
  aiModels: [],
  profile: { name: '', email: '', avatar: null },
  waNumbers: [],
  billing: { totalCost: 0, freeMsgs: 0, paidMsgs: 0, totalMsgs: 0 },
  replyMode: 'text', // 'text' | 'json' | 'template'
  isTemplateMode: false,
  searchQuery: '',
  unreadCount: 0,
};

// ====================================================================
//  RENDER FUNCTIONS
// ====================================================================

function renderChatList() {
  const container = document.getElementById('chatList');
  const query = state.searchQuery.toLowerCase().trim();
  let filtered = state.conversations;

  if (query) {
    filtered = state.conversations.filter(c => {
      const nameMatch = c.name.toLowerCase().includes(query);
      const msgMatch = c.messages.some(m => m.body.toLowerCase().includes(query));
      return nameMatch || msgMatch;
    });
  }

  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">💬</div><p>${query ? 'No matches found' : 'No conversations yet'}</p></div>`;
    return;
  }

  container.innerHTML = filtered.map(c => {
    const lastMsg = c.messages[c.messages.length - 1];
    const isUnread = c.unread > 0;
    const avatar = getAvatar(c.phone);
    return `
      <div class="chat-item" onclick="openThread('${c.phone}')">
        <div class="avatar">${avatar ? `<img src="${avatar}" alt="avatar" />` : c.name.charAt(0).toUpperCase()}</div>
        <div class="info">
          <div class="name">
            ${c.name}
            <span class="time ${isUnread ? 'unread' : ''}">${formatTime(lastMsg?.at || c.lastAt)}</span>
          </div>
          <div class="preview">
            <span>${lastMsg?.body || c.lastBody || 'No messages'}</span>
            ${isUnread ? `<span class="unread-badge">${c.unread}</span>` : ''}
          </div>
        </div>
      </div>
    `;
  }).join('');

  updateUnreadBadge();
}

function renderThread() {
  const c = state.conversations.find(x => x.phone === state.currentPhone);
  if (!c) return;

  const avatar = getAvatar(c.phone);
  document.getElementById('threadAvatar').innerHTML = avatar ? `<img src="${avatar}" alt="avatar" />` : c.name.charAt(0).toUpperCase();
  document.getElementById('threadName').textContent = c.name;
  document.getElementById('threadStatus').textContent = c.messages.length > 0 ? 'Last message: ' + formatTime(c.messages[c.messages.length-1].at) : 'via WhatsApp';

  const area = document.getElementById('msgArea');
  let lastDay = null;
  let html = '';
  for (const m of c.messages) {
    const d = new Date(m.at);
    const dayKey = d.toDateString();
    if (dayKey !== lastDay) {
      html += `<div class="day-chip">${d.toLocaleDateString([], { weekday: 'long', day: 'numeric', month: 'short' })}</div>`;
      lastDay = dayKey;
    }
    const ticks = m.dir === 'out' ? `<span class="tick read">✓✓</span>` : '';
    html += `<div class="bubble-row ${m.dir}">
      <div class="bubble ${m.dir}">
        ${m.body}
        <div class="meta"><span>${d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}</span> ${ticks}</div>
      </div>
    </div>`;
  }
  area.innerHTML = html;
  area.scrollTop = area.scrollHeight;

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) {
    return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  }
  const diff = (now - d) / 60000;
  if (diff < 60) return `${Math.floor(diff)}m`;
  if (diff < 1440) return `${Math.floor(diff/60)}h`;
  return d.toLocaleDateString([], { day: '2-digit', month: 'short' });
}

function getAvatar(phone) {
  const key = `avatar_${phone}`;
  try {
    const data = localStorage.getItem(key);
    if (data) return data; // base64 image

  return null;
}

    document.getElementById('sendBtn').disabled = true;
  } else {
    input.placeholder = mode === 'json' ? 'Paste JSON interactive object...' : 'Type a message...';
    input.disabled = false;
    tplBtn.style.display = 'none';
    document.getElementById('sendBtn').disabled = false;
  }

async function sendMessage() {
  const input = document.getElementById('composerInput');
  const text = input.value.trim();
  if (!text || !state.currentPhone) return;

  const c = state.conversations.find(x => x.phone === state.currentPhone);
  if (!c) return;

  if (state.replyMode === 'json') {
    let json;
    try { json = JSON.parse(text); } catch(e) {
      showToast('Invalid JSON. Please check the format.');
      return;
    }
    showToast('📤 Sending interactive JSON...');
    const res = await API.sendReply(state.currentPhone, JSON.stringify(json));
    if (res.success) {
      c.messages.push({ dir: 'out', body: '📋 [Interactive message sent]', at: new Date().toISOString() });
      renderThread();
      input.value = '';
      autoResize(input);
      showToast('✅ Interactive message sent');
    }
    return;
  }

  showToast('📤 Sending...');
  const res = await API.sendReply(state.currentPhone, text);
  if (res.success) {
    c.messages.push({ dir: 'out', body: text, at: new Date().toISOString() });
    renderThread();
    input.value = '';
    autoResize(input);
    showToast('✅ Message sent');
  } else {
    showToast('❌ Failed to send');
  }
}

// ===== DRAG TO DISMISS MODAL =====
let startY = 0;
let currentY = 0;
let isDragging = false;

function initModalDrag() {
  const modal = document.getElementById('templateModal');
  const sheet = document.getElementById('templateModalSheet');
  const handle = document.getElementById('modalHandle');
  
  if (!sheet || !handle) return;
  
  // Remove existing listeners to prevent duplicates
  handle.removeEventListener('touchstart', handleDragStart);
  handle.removeEventListener('touchmove', handleDragMove);
  handle.removeEventListener('touchend', handleDragEnd);
  document.removeEventListener('mousemove', handleDragMove);
  document.removeEventListener('mouseup', handleDragEnd);
  
  // Touch events for mobile
  handle.addEventListener('touchstart', handleDragStart, { passive: true });
  handle.addEventListener('touchmove', handleDragMove, { passive: false });
  handle.addEventListener('touchend', handleDragEnd, { passive: true });
  
  // Mouse events for desktop
  handle.addEventListener('mousedown', handleDragStart);
  document.addEventListener('mousemove', handleDragMove);
  document.addEventListener('mouseup', handleDragEnd);
}

function handleDragStart(e) {
  const touch = e.touches ? e.touches[0] : e;
  startY = touch.clientY;
  isDragging = true;
  const sheet = document.getElementById('templateModalSheet');
  if (sheet) {
    sheet.style.transition = 'none';
  }
}

function handleDragMove(e) {
  if (!isDragging) return;
  
  const touch = e.touches ? e.touches[0] : e;
  currentY = touch.clientY;
  const diff = currentY - startY;
  
  if (diff > 0) {
    e.preventDefault();
    const sheet = document.getElementById('templateModalSheet');
    if (sheet) {
      sheet.style.transform = `translateY(${diff}px)`;
      sheet.style.opacity = 1 - (diff / 300);
    }
  }
}

function handleDragEnd(e) {
  if (!isDragging) return;
  isDragging = false;
  
  const sheet = document.getElementById('templateModalSheet');
  const diff = currentY - startY;
  
  // If dragged down more than 100px, close the modal
  if (diff > 100) {
    closeTemplateModal();
  } else if (sheet) {
    // Snap back
    sheet.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
    sheet.style.transform = 'translateY(0)';
    sheet.style.opacity = '1';
    
    // Reset after animation
    setTimeout(() => {
      if (sheet) {
        sheet.style.transition = '';
      }
    }, 300);
  }
}

async function openTemplateModal() {
  const modal = document.getElementById('templateModal');
  const sheet = document.getElementById('templateModalSheet');
  const body = document.getElementById('tplModalBody');
  const sub = document.getElementById('tplModalSub');

  const c = state.conversations.find(x => x.phone === state.currentPhone);
  const lastInbound = c ? [...c.messages].reverse().find(m => m.dir === 'in') : null;
  const withinWindow = lastInbound && (Date.now() - new Date(lastInbound.at).getTime()) < 22 * 3600 * 1000;

  if (withinWindow) {
    sub.textContent = '💬 You\'re within the 22h window — you can also reply with text or JSON.';
  } else {
    sub.textContent = '⏰ 22h window closed — choose a template below.';
  }

  const tpls = state.approvedTemplates;
  if (!tpls.length) {
    body.innerHTML = `<div class="empty-tpl">No approved templates available.</div>`;
    modal.classList.add('open');
    return;
  }

  body.innerHTML = tpls.map((t, idx) => `
    <div style="background:var(--surface2);border-radius:12px;padding:12px;margin-bottom:10px;border:1px solid var(--border);cursor:pointer;" onclick="selectTemplate('${t.id}')">
      <div style="font-weight:600;font-size:14px;color:var(--green);">${t.name}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:4px;">${t.body.substring(0, 80)}${t.body.length > 80 ? '…' : ''}</div>
    </div>
  `).join('');

  // Reset sheet position
  if (sheet) {
    sheet.style.transform = 'translateY(0)';
    sheet.style.opacity = '1';
    sheet.style.transition = '';
  }
  
  modal.classList.add('open');
  // Initialize drag only after modal is open
  setTimeout(initModalDrag, 50);
}

function closeTemplateModal() {
  const modal = document.getElementById('templateModal');
  const sheet = document.getElementById('templateModalSheet');
  
  // Animate slide down
  if (sheet) {
    sheet.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
    sheet.style.transform = 'translateY(100%)';
    sheet.style.opacity = '0';
  }
  
  setTimeout(() => {
    modal.classList.remove('open');
    if (sheet) {
      sheet.style.transform = '';
      sheet.style.opacity = '';
      sheet.style.transition = '';
    }
    // Reset drag state
    isDragging = false;
  }, 300);
}

async function selectTemplate(templateId) {
  const c = state.conversations.find(x => x.phone === state.currentPhone);
  if (!c) return;

  const tpl = state.approvedTemplates.find(t => t.id === templateId);
  if (!tpl) return;

  const matches = tpl.body.match(/\{\{(\d+)\}\}/g) || [];
  const placeholders = [...new Set(matches.map(m => m.match(/\{(\d+)\}/)?.[1] || ''))].filter(Boolean);

  const body = document.getElementById('tplModalBody');
  const sub = document.getElementById('tplModalSub');

  let fieldsHtml = placeholders.map(p => `
    <div class="placeholder-row">
      <span class="tag">{{${p}}}</span>
      <input type="text" id="tplField_${p}" placeholder="Enter value for {{${p}}}..." />
    </div>
  `).join('');

  if (!placeholders.length) {
    fieldsHtml = '<div style="color:var(--text2);font-size:13px;margin-bottom:10px;">No placeholders to fill. Click send to use this template.</div>';
  }

  body.innerHTML = `
    <div class="tpl-preview">${tpl.body.replace(/\{\{(\d+)\}\}/g, (m, p) => `<span style="color:var(--purple);font-weight:600;">{{${p}}}</span>`)}</div>
    ${fieldsHtml}
    <div class="modal-actions">
      <button class="cancel" onclick="closeTemplateModal()">Cancel</button>
      <button class="send" onclick="sendTemplateMessage('${templateId}')">📤 Send</button>
    </div>
  `;

  sub.textContent = `📋 ${tpl.name}`;
}

async function sendTemplateMessage(templateId) {
  const c = state.conversations.find(x => x.phone === state.currentPhone);
  if (!c) return;

  const tpl = state.approvedTemplates.find(t => t.id === templateId);
  if (!tpl) return;

  const matches = tpl.body.match(/\{\{(\d+)\}\}/g) || [];
  const placeholders = [...new Set(matches.map(m => m.match(/\{(\d+)\}/)?.[1] || ''))].filter(Boolean);

  const values = {};
  for (const p of placeholders) {
    const input = document.getElementById(`tplField_${p}`);
    if (input) values[p] = input.value.trim() || `[${p}]`;
    else values[p] = `[${p}]`;
  }

  let message = tpl.body;
  for (const [k, v] of Object.entries(values)) {
    message = message.replaceAll(`{{${k}}}`, v);
  }

  showToast('📤 Sending template...');
  
  // Close modal immediately when sending starts
  closeTemplateModal();
  
  const res = await API.sendTemplate(state.currentPhone, templateId, values);
  if (res.success) {
    c.messages.push({ dir: 'out', body: message, at: new Date().toISOString() });
    renderThread();
    showToast('✅ Template sent');
  } else {
    showToast('❌ Failed to send template');
  }
}

  document.getElementById(`panel-${tab}`).classList.add('active');

  if (document.getElementById('threadOverlay').classList.contains('open')) {

  if (tab === 'settings') {
    await loadSettings();
    renderSettings();
  } else if (tab === 'profile') {

    renderProfile();
  } else if (tab === 'billing') {
    await refreshBilling();
  } else if (tab === 'chats') {
    await loadChats();
  }
}

  const params = new URLSearchParams(window.location.hash.substring(1));

  if (hashToken) {
    localStorage.setItem('supabase_token', hashToken);
    window.history.replaceState({}, document.title, window.location.pathname);
  }
}

const savedToken = localStorage.getItem('supabase_token');
if (savedToken) { 
  authToken = savedToken; 
  init(); 
} else { 
  window.location.href = '/login.html'; 
}
