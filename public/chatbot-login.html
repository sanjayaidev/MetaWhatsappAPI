<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WaBlast Pro | Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Syne:wght@800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: #080b10; color: #e8f0fb; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.auth-card { max-width: 420px; width: 100%; background: #0f1520; border: 1px solid #263550; border-radius: 24px; padding: 40px 36px; }
.auth-brand { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
.auth-brand-icon { width: 42px; height: 42px; background: #22d172; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.auth-brand-name { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
.auth-brand-name span { color: #22d172; }
.auth-card h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.auth-card > p { font-size: 13px; color: #7a90b0; margin-bottom: 28px; }
.auth-error { background: rgba(240,79,110,0.12); color: #f04f6e; border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; display: none; }
.fg { margin-bottom: 14px; }
.fg label { display: block; font-size: 11px; font-weight: 600; color: #7a90b0; letter-spacing: .05em; text-transform: uppercase; margin-bottom: 7px; }
.fg input { width: 100%; background: #0c1018; border: 1px solid #263550; border-radius: 12px; padding: 12px 14px; color: #e8f0fb; font-family: 'DM Sans', sans-serif; font-size: 14px; }
.fg input:focus { outline: none; border-color: #22d172; }
.auth-btn { width: 100%; padding: 13px; background: #22d172; color: #000; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; }
.auth-btn:hover { background: #1bbf64; }
.auth-btn:disabled { background: #263550; color: #445570; cursor: not-allowed; }
.auth-divider { display: flex; align-items: center; gap: 12px; margin: 18px 0; color: #445570; font-size: 12px; }
.auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: #263550; }
.oauth-btn { width: 100%; padding: 12px; background: #141c2a; color: #e8f0fb; font-weight: 600; border: 1px solid #263550; border-radius: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }
.oauth-btn:hover { border-color: #22d172; }
.footer-text { text-align: center; font-size: 12px; color: #445570; margin-top: 24px; }
.footer-text a { color: #22d172; text-decoration: none; }
</style>
</head>
<body>
<div class="auth-card">
  <div class="auth-brand">
    <div class="auth-brand-icon">💬</div>
    <div class="auth-brand-name">Wa<span>Blast</span> <span style="font-size:13px;font-weight:400;color:#445570">Pro</span></div>
  </div>
  <h1>Welcome back</h1>
  <p>Sign in to your WhatsApp Business dashboard</p>
  <div class="auth-error" id="authError"></div>
  <div class="fg"><label>Email</label><input type="email" id="authEmail" placeholder="you@example.com"></div>
  <div class="fg"><label>Password</label><input type="password" id="authPass" placeholder="••••••••"></div>
  <button class="auth-btn" id="authSubmitBtn">Sign In →</button>
  <div class="footer-text">
    Need an account? <a href="/admin/register.html">Admin Registration</a>
  </div>
</div>

<script>
let SUPABASE_URL = null;
let SUPABASE_ANON_KEY = null;

async function loadConfig() {
  if (SUPABASE_URL && SUPABASE_ANON_KEY) return;
  const res = await fetch('/api/public-config');
  const cfg = await res.json();
  SUPABASE_URL = cfg.supabaseUrl;
  SUPABASE_ANON_KEY = cfg.supabaseAnonKey;
  if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
    throw new Error('Server is missing SUPABASE_URL / SUPABASE_ANON_KEY env vars');
  }
}

function showAuthError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg; el.style.display = 'block';
}

async function handleEmailAuth() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPass').value;
  if (!email || !password) { showAuthError('Please enter email and password'); return; }
  
  const btn = document.getElementById('authSubmitBtn');
  btn.textContent = 'Please wait…'; btn.disabled = true;
  
  try {
    await loadConfig();
    const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    
    if (error) { showAuthError(error.message); }
    else if (data.session) {
      localStorage.setItem('supabase_token', data.session.access_token);
      // Redirect to chatbot-builder.html after successful login
      window.location.href = '/chatbot-builder.html';
    }
  } catch (err) { showAuthError(err.message); }
  btn.textContent = 'Sign In →'; btn.disabled = false;
}

async function handleGoogleLogin() {
  await loadConfig();
  const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + '/chatbot-builder.html' } });
}

async function handleFacebookLogin() {
  await loadConfig();
  const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  await sb.auth.signInWithOAuth({ provider: 'facebook', options: { redirectTo: window.location.origin + '/chatbot-builder.html' } });
}

document.getElementById('authSubmitBtn').onclick = handleEmailAuth;
document.addEventListener('keydown', e => { if (e.key === 'Enter') handleEmailAuth(); });
</script>
</body>
</html>
