services:
  - type: web
    name: metawhatsappapi
    env: node
    plan: free # Or 'starter' if you want it to stay awake 24/7
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      # We no longer auto-provision a DB. You manually set DATABASE_URL in the Render dashboard to point to Supabase.
      - key: DATABASE_URL
        sync: false 
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: META_WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: NODE_ENV
        value: production
