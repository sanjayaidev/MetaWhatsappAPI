databases:
  - name: wablast-db
    plan: free # Change to 'starter' if you need more storage
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow connections from anywhere (useful for local pgAdmin testing)

services:
  - type: web
    name: wablast-server
    env: node
    plan: free # Change to 'starter' to prevent sleeping
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      # Database connection string automatically injected by Render
      - key: DATABASE_URL
        database:
          name: wablast-db
          property: connectionString
      
      # You must manually set these in the Render Dashboard -> Environment Variables
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: META_WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: NODE_ENV
        value: production
